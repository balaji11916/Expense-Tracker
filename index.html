<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Kharcha — Daily Expense Tracker</title> <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"> <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script> <style> :root { --daily-limit: 200; --c1: #6366f1; --c2: #a855f7; --c3: #ec4899; --c4: #f97316; --red: #ff4d6d; --green: #22d3a5; --bg: #0a0a14; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --text: #f0f0ff; --muted: rgba(240,240,255,0.4); } * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; } /* ── WAVE BACKGROUND ── */ .wave-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; } .wave-bg canvas { width: 100%; height: 100%; } .grain { position: fixed; inset: 0; z-index: 1; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); pointer-events: none; } /* ── LAYOUT ── */ .app { position: relative; z-index: 2; max-width: 520px; margin: 0 auto; padding: 24px 16px 80px; } /* ── HEADER ── */ header { text-align: center; padding: 32px 0 24px; } .logo { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3), var(--c4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; } .tagline { font-size: 0.82rem; color: var(--muted); margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; } /* ── DATE NAV ── */ .date-nav { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 10px 16px; margin-bottom: 20px; backdrop-filter: blur(12px); } .date-nav button { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; } .date-nav button:hover { color: var(--text); background: var(--border); } .date-label { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); } /* ── BUDGET RING ── */ .budget-ring-wrap { display: flex; justify-content: center; margin-bottom: 20px; } .ring-container { position: relative; width: 160px; height: 160px; } .ring-container svg { transform: rotate(-90deg); } .ring-track { fill: none; stroke: var(--border); stroke-width: 12; } .ring-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1), stroke 0.4s; } .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; } .ring-spent { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; } .ring-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; } /* ── SUMMARY PILLS ── */ .summary-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; } .pill { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; backdrop-filter: blur(12px); transition: transform 0.2s; } .pill:hover { transform: translateY(-2px); } .pill-val { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; } .pill-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; } .pill.red .pill-val { color: var(--red); } .pill.green .pill-val { color: var(--green); } .pill.neutral .pill-val { color: var(--c2); } /* ── NEED-TO-SAVE BANNER ── */ .nts-banner { border-radius: 14px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 0.88rem; font-weight: 500; backdrop-filter: blur(12px); animation: slideIn 0.4s ease; border: 1px solid; } .nts-banner.over { background: rgba(255,77,109,0.1); border-color: rgba(255,77,109,0.25); color: var(--red); } .nts-banner.under { background: rgba(34,211,165,0.08); border-color: rgba(34,211,165,0.2); color: var(--green); } .nts-icon { font-size: 1.4rem; } .nts-text strong { display: block; font-family: 'Syne', sans-serif; font-size: 1rem; } /* ── INPUT CARD ── */ .input-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(16px); } .input-card h3 { font-family: 'Syne', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; } .input-row { display: flex; gap: 10px; align-items: stretch; } .input-group { flex: 1; position: relative; } .input-group input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; transition: border 0.2s, box-shadow 0.2s; } .input-group input:focus { border-color: var(--c2); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); } .input-group input::placeholder { color: var(--muted); } .input-group .prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; } .input-group.amt input { padding-left: 28px; } .add-btn { background: linear-gradient(135deg, var(--c1), var(--c3)); border: none; border-radius: 12px; padding: 0 20px; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(99,102,241,0.3); } .add-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.4); } .add-btn:active { transform: translateY(0); } /* ── EXPENSE LIST ── */ .expenses-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 20px; backdrop-filter: blur(16px); } .expenses-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; } .expenses-header h3 { font-family: 'Syne', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); } .count-badge { background: rgba(168,85,247,0.15); color: var(--c2); border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 600; } .expense-item { display: flex; align-items: center; padding: 14px 20px; gap: 12px; border-bottom: 1px solid var(--border); animation: slideIn 0.3s ease; transition: background 0.2s; } .expense-item:last-child { border-bottom: none; } .expense-item:hover { background: rgba(255,255,255,0.03); } .exp-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.2)); border: 1px solid rgba(168,85,247,0.2); } .exp-name { flex: 1; font-size: 0.9rem; font-weight: 500; } .exp-time { font-size: 0.72rem; color: var(--muted); } .exp-amount { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--red); } .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 4px; border-radius: 6px; transition: all 0.2s; opacity: 0; } .expense-item:hover .del-btn { opacity: 1; } .del-btn:hover { color: var(--red); background: rgba(255,77,109,0.1); } .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.85rem; } .empty-icon { font-size: 2rem; margin-bottom: 8px; } /* ── CHARTS ── */ .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(16px); } .chart-card h3 { font-family: 'Syne', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; } /* ── WEEKLY/MONTHLY SUMMARY ── */ .period-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; } .period-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 16px; backdrop-filter: blur(12px); transition: transform 0.2s; } .period-card:hover { transform: translateY(-2px); } .period-icon { font-size: 1.4rem; margin-bottom: 8px; } .period-title { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; } .period-spent { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; } .period-limit { font-size: 0.72rem; color: var(--muted); margin-top: 2px; } .period-bar { height: 4px; background: var(--border); border-radius: 4px; margin-top: 10px; overflow: hidden; } .period-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); } /* ── RESET BUTTON ── */ .reset-btn { display: block; width: 100%; background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); border-radius: 14px; padding: 13px; color: var(--red); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; } .reset-btn:hover { background: rgba(255,77,109,0.15); } /* ── ANIMATIONS ── */ @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } .app { animation: fadeIn 0.5s ease; } /* ── TOAST ── */ .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: rgba(30,20,50,0.95); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 0.85rem; backdrop-filter: blur(20px); z-index: 999; transition: transform 0.3s cubic-bezier(.4,0,.2,1); white-space: nowrap; } .toast.show { transform: translateX(-50%) translateY(0); } </style> </head> <body> <!-- Wave background canvas --> <div class="wave-bg"><canvas id="waveCanvas"></canvas></div> <div class="grain"></div> <div class="app"> <!-- Header --> <header> <div class="logo">Kharcha</div> <div class="tagline">Daily Expense Tracker</div> </header> <!-- Date Navigation --> <div class="date-nav"> <button onclick="changeDay(-1)">‹</button> <div class="date-label" id="dateLabel">Today</div> <button onclick="changeDay(1)">›</button> </div> <!-- Budget Ring --> <div class="budget-ring-wrap"> <div class="ring-container"> <svg width="160" height="160" viewBox="0 0 160 160"> <circle class="ring-track" cx="80" cy="80" r="64"/> <circle class="ring-fill" id="ringFill" cx="80" cy="80" r="64" stroke-dasharray="402.12" stroke-dashoffset="402.12" stroke="url(#ringGrad)"/> <defs> <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%"> <stop offset="0%" stop-color="#6366f1"/> <stop offset="50%" stop-color="#ec4899"/> <stop offset="100%" stop-color="#f97316"/> </linearGradient> </defs> </svg> <div class="ring-center"> <div class="ring-spent" id="ringSpent">₹0</div> <div class="ring-label">of ₹200</div> </div> </div> </div> <!-- Summary Pills --> <div class="summary-row"> <div class="pill green"> <div class="pill-val" id="remainingVal">₹200</div> <div class="pill-lbl">Remaining</div> </div> <div class="pill red"> <div class="pill-val" id="spentVal">₹0</div> <div class="pill-lbl">Spent</div> </div> <div class="pill neutral"> <div class="pill-val" id="countVal">0</div> <div class="pill-lbl">Items</div> </div> </div> <!-- Need-to-Save Banner --> <div class="nts-banner" id="ntsBanner" style="display:none"></div> <!-- Input Card --> <div class="input-card"> <h3>Add Expense</h3> <div class="input-row"> <div class="input-group" style="flex:2"> <input type="text" id="expName" placeholder="Expense name..." maxlength="40" onkeydown="handleKey(event)"> </div> <div class="input-group amt"> <span class="prefix">₹</span> <input type="number" id="expAmt" placeholder="Amount" min="1" onkeydown="handleKey(event)"> </div> <button class="add-btn" onclick="addExpense()">+</button> </div> </div> <!-- Expenses List --> <div class="expenses-card"> <div class="expenses-header"> <h3>Today's Expenses</h3> <span class="count-badge" id="countBadge">0 items</span> </div> <div id="expenseList"> <div class="empty-state"> <div class="empty-icon">🧾</div> No expenses yet. Add your first one above! </div> </div> </div> <!-- Week Chart --> <div class="chart-card"> <h3>This Week</h3> <canvas id="weekChart" height="120"></canvas> </div> <!-- Weekly & Monthly Summary --> <div class="period-cards"> <div class="period-card"> <div class="period-icon">📅</div> <div class="period-title">Weekly</div> <div class="period-spent" id="weekSpent">₹0</div> <div class="period-limit">Limit ₹1,400</div> <div class="period-bar"><div class="period-bar-fill" id="weekBar" style="width:0%;background:linear-gradient(90deg,#6366f1,#ec4899)"></div></div> </div> <div class="period-card"> <div class="period-icon">🗓️</div> <div class="period-title">Monthly</div> <div class="period-spent" id="monthSpent">₹0</div> <div class="period-limit">Limit ₹5,600</div> <div class="period-bar"><div class="period-bar-fill" id="monthBar" style="width:0%;background:linear-gradient(90deg,#a855f7,#f97316)"></div></div> </div> </div> <!-- Reset --> <button class="reset-btn" onclick="resetDay()">🗑 Reset Today's Expenses</button> </div> <!-- Toast --> <div class="toast" id="toast"></div> <script> // ── WAVE CANVAS ── const canvas = document.getElementById('waveCanvas'); const ctx = canvas.getContext('2d'); let t = 0; function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } resizeCanvas(); window.addEventListener('resize', resizeCanvas); function drawWaves() { ctx.clearRect(0, 0, canvas.width, canvas.height); const W = canvas.width, H = canvas.height; // background const bg = ctx.createLinearGradient(0, 0, W, H); bg.addColorStop(0, '#060612'); bg.addColorStop(1, '#0d0820'); ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H); const waves = [ { color: 'rgba(99,102,241,0.07)', amp: 80, freq: 0.005, speed: 0.4, yBase: H * 0.55 }, { color: 'rgba(168,85,247,0.06)', amp: 60, freq: 0.007, speed: 0.6, yBase: H * 0.62 }, { color: 'rgba(236,72,153,0.05)', amp: 70, freq: 0.004, speed: 0.3, yBase: H * 0.70 }, { color: 'rgba(249,115,22,0.04)', amp: 50, freq: 0.009, speed: 0.8, yBase: H * 0.78 }, { color: 'rgba(99,102,241,0.04)', amp: 90, freq: 0.003, speed: 0.25, yBase: H * 0.45 }, ]; waves.forEach(w => { ctx.beginPath(); ctx.moveTo(0, H); for (let x = 0; x <= W; x += 3) { const y = w.yBase + Math.sin(x * w.freq + t * w.speed) * w.amp + Math.sin(x * w.freq * 2 + t * w.speed * 1.3) * (w.amp * 0.4); ctx.lineTo(x, y); } ctx.lineTo(W, H); ctx.closePath(); ctx.fillStyle = w.color; ctx.fill(); }); t += 0.015; requestAnimationFrame(drawWaves); } drawWaves(); // ── DATA ── const LIMIT = 200; function getKey(date) { return 'kharcha_' + date.toISOString().split('T')[0]; } function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; } let currentDate = todayDate(); function loadDay(date) { const key = getKey(date); const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : []; } function saveDay(date, expenses) { localStorage.setItem(getKey(date), JSON.stringify(expenses)); } let expenses = loadDay(currentDate); // ── EMOJI MAP ── function getEmoji(name) { const n = name.toLowerCase(); if (/food|lunch|dinner|breakfast|eat|meal|snack|rice|dal|roti|biryani/.test(n)) return '🍱'; if (/tea|coffee|chai|drink/.test(n)) return '☕'; if (/auto|bus|cab|uber|ola|travel|ride|metro/.test(n)) return '🚌'; if (/phone|mobile|recharge|data/.test(n)) return '📱'; if (/book|study|pen|paper/.test(n)) return '📚'; if (/medicine|tablet|medical|doctor/.test(n)) return '💊'; if (/gym|fitness|sport/.test(n)) return '💪'; if (/shop|buy|cloth/.test(n)) return '🛍️'; return '💸'; } // ── RENDER ── function render() { const today = todayDate(); const isToday = currentDate.toDateString() === today.toDateString(); const diff = Math.round((currentDate - today) / 86400000); if (diff === 0) document.getElementById('dateLabel').textContent = 'Today'; else if (diff === -1) document.getElementById('dateLabel').textContent = 'Yesterday'; else if (diff === 1) document.getElementById('dateLabel').textContent = 'Tomorrow'; else { document.getElementById('dateLabel').textContent = currentDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); } const total = expenses.reduce((s, e) => s + e.amount, 0); const remaining = LIMIT - total; const pct = Math.min(total / LIMIT, 1); // Ring const circumference = 2 * Math.PI * 64; const offset = circumference - pct * circumference; document.getElementById('ringFill').style.strokeDashoffset = offset; document.getElementById('ringFill').style.stroke = total > LIMIT ? '#ff4d6d' : 'url(#ringGrad)'; document.getElementById('ringSpent').textContent = '₹' + total; document.getElementById('ringSpent').style.color = total > LIMIT ? '#ff4d6d' : '#f0f0ff'; // Pills document.getElementById('spentVal').textContent = '₹' + total; document.getElementById('remainingVal').textContent = '₹' + Math.max(0, remaining); document.getElementById('countVal').textContent = expenses.length; document.getElementById('countBadge').textContent = expenses.length + ' item' + (expenses.length !== 1
